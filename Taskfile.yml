version: "3"

tasks:
  go:test:
    desc: Run Session Core Go unit tests.
    dir: fairy
    cmds:
      - go test ./...

  build:
    desc: Build the fairy Session Core binary.
    deps:
      - go:test
    dir: fairy
    cmds:
      - mkdir -p ../bin
      - go build -o ../bin/fairy .

  verify:
    desc: Verify Session Core.
    deps:
      - go:test
    cmds:
      - git diff --check
      - task build
